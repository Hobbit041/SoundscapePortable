<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soundscape</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div id="app">

  <!-- ═══ HEADER ═══════════════════════════════════════════════════════════ -->
  <header id="header">
    <div class="header-left">
      <span class="app-logo"><i class="fas fa-music"></i> Soundscape</span>
      <span id="midiStatus" class="midi-status">MIDI: scanning…</span>
    </div>
    <div class="header-center">
      <button id="prevSoundscape" title="Previous soundscape"><i class="fas fa-chevron-left"></i></button>
      <input id="soundscapeName" type="text" placeholder="Soundscape name" spellcheck="false">
      <button id="nextSoundscape" title="Next soundscape"><i class="fas fa-chevron-right"></i></button>
      <span id="soundscapeNumber" class="ss-number">1 / 1</span>
      <button id="addSoundscape"  title="Add soundscape"><i class="fas fa-plus"></i></button>
      <button id="delSoundscape"  title="Delete soundscape" class="btn-danger"><i class="fas fa-trash"></i></button>
    </div>
    <div class="header-right">
      <label class="vol-label"><i class="fas fa-volume-low"></i></label>
      <input id="globalVolume" type="range" min="0" max="100" step="1" value="50" title="Global output volume">
      <button id="btnImport" title="Import .soundscapeData"><i class="fas fa-file-import"></i></button>
      <button id="btnExport" title="Export .soundscapeData"><i class="fas fa-file-export"></i></button>
      <button id="playMix" class="btn-play"><i class="fas fa-play"></i></button>
    </div>
  </header>

  <!-- ═══ MAIN AREA ════════════════════════════════════════════════════════ -->
  <main id="main-area">

    <!-- ── MIXER SECTION ─────────────────────────────────────────────── -->
    <section id="mixer-section">

      <!-- 8 channel strips + master -->
      <div id="channel-strip-row">

        <!-- Channel strips 0-7 -->
        <div class="channel-strip" id="box-0" data-channel="0">
          <div class="ch-top">
            <button class="btn-config" id="config-0" title="Load audio file">
              <i class="fas fa-folder-open"></i>
            </button>
            <button class="btn-fx" id="fx-0" title="FX">FX</button>
          </div>
          <input class="ch-name" id="channelName-0" type="text" placeholder="Channel 1" spellcheck="false">
          <div class="ch-buttons">
            <button class="btn-mute" id="mute-0">M</button>
            <button class="btn-solo" id="solo-0">S</button>
            <button class="btn-link" id="link-0">L</button>
          </div>
          <div class="ch-fader-wrap">
            <input class="ch-fader" id="volumeSlider-0" type="range" min="0" max="125" step="1" value="100" orient="vertical">
          </div>
          <div class="ch-vol-number-wrap">
            <input class="ch-vol-number" id="volumeNumber-0" type="number" min="0" max="125" value="100">
          </div>
          <input class="ch-pan" id="panSlider-0" type="range" min="-25" max="25" step="1" value="0" title="Pan">
          <div class="ch-label">1</div>
          <button class="btn-play-ch" id="playSound-0"><i class="fas fa-play"></i></button>
          <div class="ch-nav">
            <button class="btn-nav-ch" id="prevTrack-0" title="Предыдущий трек">‹</button>
            <button class="btn-nav-ch" id="nextTrack-0" title="Следующий трек">›</button>
          </div>
        </div>

        <div class="channel-strip" id="box-1" data-channel="1">
          <div class="ch-top">
            <button class="btn-config" id="config-1" title="Load audio file"><i class="fas fa-folder-open"></i></button>
            <button class="btn-fx" id="fx-1">FX</button>
          </div>
          <input class="ch-name" id="channelName-1" type="text" placeholder="Channel 2" spellcheck="false">
          <div class="ch-buttons">

            <button class="btn-solo" id="solo-1">S</button>

          </div>

        <!-- MASTER strip -->
        <div class="channel-strip master-strip" id="box-master">
          <div class="ch-top" style="justify-content:center">
            <span class="master-label-top">MASTER</span>
          </div>
          <div class="ch-buttons" style="justify-content:center; margin-top:4px">
            <button class="btn-mute" id="mute-master">M</button>
          </div>
          <div class="ch-fader-wrap">
            <input class="ch-fader" id="volumeSlider-master" type="range" min="0" max="125" step="1" value="100" orient="vertical">
          </div>
          <div class="ch-vol-number-wrap">
            <input class="ch-vol-number" id="volumeNumber-master" type="number" min="0" max="125" value="100">
          </div>
          <div class="ch-label" style="font-size:9px; letter-spacing:1px">MASTER</div>
        </div>

      </div><!-- /channel-strip-row -->
    </section>

    <!-- ── SOUNDBOARD SECTION ─────────────────────────────────────────── -->
    <section id="soundboard-section">
      <div id="soundboard-header">
        <span class="sb-title">Soundboard</span>
        <div class="sb-controls">
          <label>Vol</label>
          <input id="sbVolume" type="range" min="0" max="125" step="1" value="50">
          <button id="sbStopAll" class="btn-stop-sb" title="Остановить все звуки саундборда">
            <i class="fas fa-stop"></i> Остановить звуки
          </button>
        </div>
      </div>

      <!-- 5×5 grid of soundboard buttons -->
      <div id="soundboard-grid">
        <!-- Row 1 -->
        <div class="sb-cell" id="sbButton-0">
          <div class="sb-img-wrap"><img id="sbImg-0" src="" alt=""></div>
          <div class="sb-label" id="sbLabel-0"></div>
        </div>
        <div class="sb-cell" id="sbButton-1">
          <div class="sb-img-wrap"><img id="sbImg-1" src="" alt=""></div>
          <div class="sb-label" id="sbLabel-1"></div>
        </div>

</html>
